<!DOCTYPE html>

  <style>

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    body{font-family:'Cormorant Garamond',serif;color:#e8d8b0}
    .hdr{background:linear-gradient(180deg,#050e0b,#0c1f16);border-bottom:1px solid #1a3a28;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.6)}
    .hdr-in{max-width:1200px;margin:0 auto;padding:13px 20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .ptop{height:3px;background:repeating-linear-gradient(90deg,#c8a84b 0,#c8a84b 2px,transparent 2px,transparent 8px,#c8a84b 8px,#c8a84b 10px,transparent 10px,transparent 18px)}
    .logo .la{font-family:'Amiri',serif;font-size:26px;color:#e8c96c;display:block;line-height:1}
    .logo .ls{font-family:'Cinzel',serif;font-size:8px;letter-spacing:4px;color:#5a9a6a;display:block}
    .sw{flex:1;max-width:440px;position:relative}
    .cs{width:100%;background:#0c1f16;border:1px solid #2a5a38;border-radius:8px;color:#e8d8b0;padding:10px 38px 10px 14px;font-family:'Cormorant Garamond',serif;font-size:16px;cursor:pointer;outline:none;appearance:none;transition:border-color .2s}

    .sa{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#c8a84b;pointer-events:none;font-size:10px}
    .lay{display:flex;max-width:1200px;margin:0 auto}
    .main{flex:1;padding:32px 22px;padding-bottom:max(32px,env(safe-area-inset-bottom));transition:margin-right .3s}
    .main.sb{margin-right:440px}
    .ch-hdr{text-align:center;margin-bottom:36px;animation:fadeUp .5s ease both}

    .ch-tr{font-family:'Cinzel',serif;font-size:14px;letter-spacing:5px;color:#6aaa7a;text-transform:uppercase;margin-bottom:4px}
    .ch-mt{font-size:13px;color:#4a7a58}
    .orn{display:flex;align-items:center;gap:10px;justify-content:center;margin:16px 0 28px;opacity:.45;color:#c8a84b}
    .ol{flex:1;max-width:70px;height:1px;background:linear-gradient(90deg,transparent,#c8a84b)}
    .ol.r{background:linear-gradient(90deg,#c8a84b,transparent)}
    .bismi{font-family:'Amiri',serif;font-size:32px;color:#c8a84b;direction:rtl;text-align:center;margin-bottom:32px;text-shadow:0 2px 14px rgba(200,168,75,.22);animation:fadeUp .7s .1s ease both}
    .vc{background:linear-gradient(135deg,#0c1f16,#0e2318);border:1px solid #1a3828;border-radius:12px;padding:24px;margin-bottom:16px;animation:fadeUp .4s ease both;transition:border-color .2s,box-shadow .2s}

    .vtop{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}

    .wc{display:flex;flex-direction:column;align-items:center;padding:4px 8px 6px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .16s;min-width:40px;min-height:52px}

    .war{font-family:'Amiri',serif;font-size:24px;color:#f0e0b0;line-height:1.4;direction:rtl}
    .wmn{font-size:10px;color:#6aaa7a;margin-top:2px;text-align:center;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .vp{font-family:'Amiri',serif;font-size:26px;color:#f0e0b0;direction:rtl;text-align:right;line-height:2;flex:1}

    .mw.tsel{background:rgba(106,170,122,.28);color:#e0f0e8}
    .btn-more{display:block;margin:28px auto 6px;padding:12px 44px;background:transparent;border:1px solid #c8a84b;border-radius:8px;color:#c8a84b;font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all .2s}
    .btn-more:hover{background:rgba(200,168,75,.09)}
    .btn-occ-more{display:block;width:100%;margin-top:6px;padding:11px 0;background:transparent;border:1px solid #2a5a38;border-radius:8px;color:#6aaa7a;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s}

    .sbp.open{transform:translateX(0)}
    .sbt{padding:20px 20px 16px;position:sticky;top:0;background:#060f0c;border-bottom:1px solid #162e1e;z-index:2}
    .sbx{position:absolute;top:14px;right:14px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid #2a5a38;border-radius:50%;background:transparent;color:#7aad8a;cursor:pointer;font-size:16px;transition:all .16s;line-height:1}

    .sb-back{display:none;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid #2a5a38;border-radius:6px;color:#7aad8a;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:8px 14px;cursor:pointer;margin-bottom:12px;transition:all .16s;width:100%}
    .sb-back:hover{border-color:#c8a84b;color:#c8a84b}
    .swar{font-family:'Amiri',serif;font-size:52px;color:#c8a84b;direction:rtl;text-align:center;text-shadow:0 2px 18px rgba(200,168,75,.3);line-height:1.3;margin-bottom:4px}
    .swmn{text-align:center;font-size:14px;color:#6aaa7a;font-style:italic;margin-bottom:3px}
    .swct{text-align:center;font-size:11px;color:#3a6a48;letter-spacing:2px;text-transform:uppercase}
    .sb-tr-badge{font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:#6aaa7a;border:1px solid #2a5a38;border-radius:20px;padding:3px 12px;display:block;text-align:center;margin-bottom:10px}
    .sb-tr-word{font-size:36px;color:#a8d8b8;text-align:center;font-style:italic;margin-bottom:4px}
    .sb-tr-root{text-align:center;font-size:12px;color:#4a8a5a;margin-bottom:3px}
    .sbb{padding:18px 20px 32px;padding-bottom:max(32px,env(safe-area-inset-bottom))}
    .ot{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#3a6a48;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .ot::after{content:'';flex:1;height:1px;background:#1a3020}
    .oc{background:#0c1f16;border:1px solid #1a3020;border-radius:10px;padding:14px 16px;margin-bottom:12px;transition:border-color .18s;overflow:hidden}
    .oc:hover{border-color:#2a5a38}
    .oref{font-family:'Cinzel',serif;font-size:9px;color:#c8a84b;letter-spacing:2px;margin-bottom:9px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:color .15s}
    .oref:hover{color:#f5d76e}
    .oref-k{display:flex;align-items:center;gap:5px;border:1px solid rgba(200,168,75,.22);border-radius:4px;padding:2px 7px;transition:all .16s}
    .oref:hover .oref-k{background:rgba(200,168,75,.09);border-color:rgba(200,168,75,.45)}
    .oref-arr{font-size:9px;opacity:.6}
    .oref::after{content:'';flex:1;height:1px;background:#1a3020}
    .oar{display:block;direction:rtl;text-align:right;line-height:2.1;word-break:break-word;margin-bottom:12px}
    .oaw{font-family:'Amiri',serif;font-size:19px;color:#c8b880;display:inline;padding:1px 2px;border-radius:3px}
    .oaw.hit{color:#f5d76e;background:rgba(200,168,75,.17);padding:1px 5px;animation:glow 2s ease-in-out infinite}
    .otr{border-top:1px solid #1a3020;padding-top:9px}
    .otr-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#3a6a48;margin-bottom:5px;font-family:'Cinzel',serif}

    .otr-ld{color:#2a5a38;font-size:12px}
    .tr-m{color:#a8e8b8;background:rgba(106,170,122,.18);border-radius:3px;padding:0 3px;font-weight:600;font-style:normal}
    .bn{font-size:11px;color:#3a6a48;font-style:italic;border:1px dashed #1a3828;border-radius:6px;padding:9px 12px;margin-bottom:12px;line-height:1.6}
    .hint{text-align:center;padding:14px 18px;color:#4a7a58;font-size:13px;border:1px dashed #1a3828;border-radius:8px;margin-bottom:20px;line-height:1.7}
    .hint b{color:#c8a84b;font-weight:400}
    .nr{text-align:center;padding:36px 14px;color:#3a6a48;font-style:italic;font-size:13px}
    .err-box{text-align:center;padding:32px 20px;border:1px dashed #2a5a38;border-radius:10px;margin:18px 0}
    .err-icon{font-size:28px;margin-bottom:10px}
    .err-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#c8a84b;margin-bottom:8px}
    .err-msg{font-size:13px;color:#6aaa7a;line-height:1.8;margin-bottom:16px}
    .err-code{font-size:11px;color:#2a5a38;background:#0a1a0f;border-radius:6px;padding:10px 14px;margin-bottom:14px;text-align:left;font-family:monospace;line-height:1.6}
    .err-btn{background:transparent;border:1px solid #c8a84b;border-radius:6px;color:#c8a84b;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:9px 22px;cursor:pointer;text-transform:uppercase}
    .hidden{display:none!important}
    @media(max-width:760px){
      .sbp{width:100%;top:0;height:100vh;z-index:200}
      .sbt{padding-top:max(18px,env(safe-area-inset-top))}
      .sbb{padding-bottom:max(32px,env(safe-area-inset-bottom))}
      .main.sb{margin-right:0!important}
      .main{padding:18px 14px;padding-bottom:max(18px,env(safe-area-inset-bottom))}
      .ch-ar{font-size:42px}
      .sbx{width:42px;height:42px;font-size:18px}
      .swar{font-size:40px}
      .vc{padding:16px 13px}
      .wc{min-width:38px;min-height:52px}
      .war{font-size:21px}
      .vp{font-size:23px}
      .sb-back{display:flex!important}
      .btn-more{padding:14px 32px}
    }
  </style>
</head>
<body>
<div class="ptop"></div>
<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <span class="la">القرآن الكريم</span>
      <span class="ls">Kelime Kelime</span>
    </div>
    <div class="sw">
      <select class="cs" id="chSel"></select>
      <span class="sa">▼</span>
    </div>
  </div>
</header>
<div class="ptop" style="opacity:.18"></div>
<div class="lay">
  <main class="main" id="main">
    <div id="chHdr"></div>
    <div class="hint hidden" id="hint">
      <b>✦ Nasıl kullanılır?</b><br/>
      Arapça kelimeye tıkla → Kur'an'daki geçişlerini gör &nbsp;|&nbsp; Meal kelimesine tıkla → Benzer ayetleri bul
    </div>
    <div id="vCon"></div>
    <button class="btn-more hidden" id="moreBtn">Devamını Yükle</button>

  <aside class="sbp" id="sb">
    <div class="sbt">
      <button class="sbx" id="sbClose">×</button>
      <button class="sb-back" id="sbBack">← Geri Dön</button>
      <div id="sbAr">
        <div class="swar" id="sbWord"></div>
        <div class="swmn" id="sbMn"></div>
        <div class="swct" id="sbCt"></div>
      </div>
      <div id="sbTr" class="hidden">
        <div class="sb-tr-badge">Türkçe Meal Araması</div>
        <div class="sb-tr-word" id="sbTrW"></div>
        <div class="sb-tr-root" id="sbTrR"></div>
        <div class="swct" id="sbTrCt"></div>
      </div>
    </div>
    <div class="sbb">
      <div class="sp hidden" id="occSp"></div>
      <div class="nr hidden" id="occEmpty">Geçiş bulunamadı.</div>
      <div id="occList"></div>
    </div>
  </aside>
</div>

/* ══ FETCH WRAPPER ═══════════════════════════════════════════ */
async function apiFetch(url, ms=14000) {
  if (IS_FILE) {
    throw new Error('FILE_PROTOCOL');
  }
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    clearTimeout(t);
    throw e;
  }
}

/* ══ CHAPTER LOADING ═════════════════════════════════════════ */
function loadCh(id) {
  curCh = id; curPg = 1; verses = []; hintOff = false;
  $('vCon').innerHTML = '';
  $('moreBtn').classList.add('hidden');
  $('moreSp').classList.add('hidden');
  $('hint').classList.add('hidden');
  closeSb();
  renderChHdr(id);
  fetchSurah(id);
}

function renderChHdr(id) {
  const ch = CHS.find(x => x.id === id); if (!ch) return;
  const rev   = ch.p === 'makkah' ? 'Mekki' : 'Medeni';
  const bismi = (id !== 1 && id !== 9)
    ? `<div class="bismi">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>` : '';
  $('chHdr').innerHTML = `
    <div class="ch-hdr">
      <div class="ch-ar">${ch.ar}</div>
      <div class="ch-tr">${ch.tr}</div>
      <div class="ch-mt">${ch.v} Ayet · ${rev} Sure</div>
      <div class="orn"><div class="ol"></div><span style="font-size:14px">✦</span><div class="ol r"></div></div>
      ${bismi}
    </div>`;
}

async function fetchSurah(chId) {
  $('vCon').innerHTML = sk(5);
  try {
    const d  = await apiFetch(`${BASE}/surah/${chId}/editions/quran-uthmani,tr.diyanet`);
    if (d.code !== 200 || !d.data) throw new Error(d.status || 'API error');
    const arA = d.data[0].ayahs, trA = d.data[1].ayahs;
    verses = arA.map((a, i) => ({
      n: a.numberInSurah, k: `${chId}:${a.numberInSurah}`,
      ar: a.text, tr: trA[i]?.text || ''
    }));
    $('vCon').innerHTML = '';
    showPg(1);
    loadWby(chId);
  } catch(e) {
    const isFile = e.message === 'FILE_PROTOCOL';
    $('vCon').innerHTML = `
      <div class="err-box">
        <div class="err-icon">⚠️</div>
        <div class="err-title">${isFile ? 'DOSYA PROTOKOLÜ' : 'BAĞLANTI HATASI'}</div>
        <div class="err-msg">${isFile
          ? 'Bu dosya yerel olarak açılamaz.<br/>Bir web sunucusu üzerinden açın.'
          : 'Ayetler yüklenemedi.<br/>İnternet bağlantınızı kontrol edin.'
        }</div>
        ${!isFile ? `<button class="err-btn" id="retryBtn">Yeniden Dene</button>` : ''}
      </div>`;
    $('retryBtn')?.addEventListener('click', () => loadCh(chId));
  }
}

function showPg(pg) {
  curPg = pg;
  const start = (pg - 1) * PER, slice = verses.slice(start, start + PER);
  const wby   = wbyCache[curCh] || {};
  slice.forEach((v, vi) => {
    if ($('vCon').querySelector(`[data-vk="${CSS.escape(v.k)}"]`)) return;
    const d = document.createElement('div');
    d.innerHTML = renderV(v, vi, wby);
    $('vCon').appendChild(d.firstElementChild);
  });
  attachL();
  const totPg = Math.ceil(verses.length / PER);
  if (pg < totPg) {
    $('moreBtn').classList.remove('hidden');
    $('moreBtn').textContent = `Devamını Yükle (${start + slice.length} / ${verses.length})`;
  } else {
    $('moreBtn').classList.add('hidden');
  }
  if (!hintOff && verses.length > 0) $('hint').classList.remove('hidden');
}

/* ══ WORD-BY-WORD ════════════════════════════════════════════ */
async function loadWby(chId) {
  if (wbyCache[chId]) return;
  try {
    let map = {}, pg = 1, tp = 1;
    do {
      const d = await apiFetch(
        `${BASE_QC}/verses/by_chapter/${chId}?words=true&word_fields=text_uthmani,translation_text&per_page=50&page=${pg}`
      );
      tp = d.pagination?.total_pages || 1;
      (d.verses || []).forEach(v => { map[`${chId}:${v.verse_number}`] = v.words || []; });
      pg++;
    } while (pg <= tp && pg <= 6);
    wbyCache[chId] = map;
    if (curCh === chId) upgradeCards(chId);
  } catch(e) { /* silent fallback */ }
}

function upgradeCards(chId) {
  const wby = wbyCache[chId] || {};
  $('vCon').querySelectorAll('.vc[data-vk]').forEach(card => {
    const ws = wby[card.dataset.vk]; if (!ws || !ws.length) return;
    const plain = card.querySelector('.vp'); if (!plain) return;
    const div = document.createElement('div'); div.className = 'wds';
    ws.filter(w => !isPunc(w)).forEach(w => {
      const mn = w.translation?.text || w.transliteration?.text || '';
      const wt = w.text_uthmani || w.text || '';
      const el = document.createElement('div');
      el.className = 'wc'; el.dataset.wt = wt; el.dataset.mn = mn; el.title = mn;
      el.innerHTML = `<span class="war">${esc(wt)}</span><span class="wmn">${esc(mn)}</span>`;
      div.appendChild(el);
    });
    plain.replaceWith(div); attachL();
  });
}

/* ══ RENDER VERSE ════════════════════════════════════════════ */
function renderV(v, vi, wby) {
  const ws = wby[v.k];
  let arHtml;
  if (ws && ws.length) {
    arHtml = `<div class="wds">${ws.filter(w=>!isPunc(w)).map(w=>{
      const mn=w.translation?.text||w.transliteration?.text||'';
      const wt=w.text_uthmani||w.text||'';
      return `<div class="wc" data-wt="${esc(wt)}" data-mn="${esc(mn)}" title="${esc(mn)}"><span class="war">${esc(wt)}</span><span class="wmn">${esc(mn)}</span></div>`;
    }).join('')}</div>`;
  } else {
    arHtml = `<span class="vp">${esc(v.ar)}</span>`;
  }
  const trClean = dh(v.tr.replace(/<[^>]+>/g,''));
  const trHtml  = trClean ? `<div class="vt"><div class="vtl">Türkçe Meal (Diyanet) <span style="color:#3a6a48;font-size:8px">— kelimeye tıkla</span></div><div class="mt">${wrapMW(trClean)}</div></div>` : '';
  return `<div class="vc" data-vk="${esc(v.k)}" style="animation-delay:${(vi%15)*.04}s">
    <div class="vtop"><div class="vnum">${v.n}</div>${arHtml}</div>${trHtml}</div>`;
}
function isPunc(w) { return ['end','pause','sajdah'].includes(w?.char_type_name); }

/* ══ LISTENERS ═══════════════════════════════════════════════ */
function attachL() {
  $('vCon').querySelectorAll('.wc:not([data-ls])').forEach(el => {
    el.dataset.ls = '1';
    el.addEventListener('click', () => {
      document.querySelectorAll('.wc.sel').forEach(e=>e.classList.remove('sel'));
      document.querySelectorAll('.mw.tsel').forEach(e=>e.classList.remove('tsel'));
      el.classList.add('sel'); onArClick(el.dataset.wt, el.dataset.mn);
    });
  });
  $('vCon').querySelectorAll('.mw:not([data-ls])').forEach(el => {
    el.dataset.ls = '1';
    el.addEventListener('click', () => {
      document.querySelectorAll('.wc.sel').forEach(e=>e.classList.remove('sel'));
      document.querySelectorAll('.mw.tsel').forEach(e=>e.classList.remove('tsel'));
      el.classList.add('tsel'); onTrClick(el.dataset.w);
    });
  });
}

/* ══ ARABIC WORD CLICK ═══════════════════════════════════════ */
async function onArClick(wtext, wmn) {
  if (!hintOff) { hintOff=true; $('hint').classList.add('hidden'); }
  $('sbAr').classList.remove('hidden'); $('sbTr').classList.add('hidden');
  openSb();
  $('sbWord').textContent=wtext; $('sbMn').textContent=wmn; $('sbCt').textContent='';
  $('occSp').classList.remove('hidden'); $('occEmpty').classList.add('hidden');
  $('occList').innerHTML='';
  occSt={wtext,pg:0,totPg:1,loading:false};
  await loadOccPg(wtext,true);
}

async function loadOccPg(wtext, isFirst) {
  if (occSt.loading) return; occSt.loading=true;
  const pg=occSt.pg+1;
  const btn=$('occMoreBtn'); if(!isFirst&&btn){btn.textContent='Yükleniyor…';btn.disabled=true;}
  try {
    const q=encodeURIComponent(wtext);
    const d=await apiFetch(`${BASE_QC}/search?q=${q}&language=tr&size=30&page=${pg}&translations=77`);
    const res=d.search?.results||[], tot=d.search?.total_results||0, tp=d.search?.total_pages||1;
    occSt.pg=pg; occSt.totPg=tp;
    if (isFirst) {
      $('occSp').classList.add('hidden');
      $('sbCt').textContent=tot>0?`${tot} ayet bulundu`:'ayet bulunamadı';
      if (!res.length) { $('occEmpty').classList.remove('hidden'); occSt.loading=false; return; }
    }
    let con=$('occCon');
    if (!con) {
      con=document.createElement('div'); con.id='occCon';
      con.innerHTML=`<div class="ot">Kuranda Geçtiği Yerler</div>`;
      $('occList').appendChild(con);
    }
    $('occMoreBtn')?.remove();
    const isBas=['بسم','الله','الرحمن','الرحيم'].includes(norm(wtext));
    const pending=res.map(occ=>buildOcc(occ,wtext,con));
    if (pg<tp) {
      const b=document.createElement('button'); b.id='occMoreBtn'; b.className='btn-occ-more';
      b.textContent=`Devamını Yükle (${pg*30} / ${tot})`;
      b.addEventListener('click',()=>loadOccPg(wtext,false));
      $('occList').appendChild(b);
    }
    await Promise.all(pending.map(async({tEl,vk,ex})=>{
      try {
        let tr=ex;
        if (!tr) {
          const vd=await apiFetch(`${BASE_QC}/verses/by_key/${vk}?translations=77&language=tr`);
          tr=dh((vd.verse?.translations?.[0]?.text||'').replace(/<[^>]+>/g,''));
        }
        tEl.classList.remove('otr-ld'); tEl.textContent=tr||'—';
      } catch(e) { tEl.classList.remove('otr-ld'); tEl.textContent='—'; }
    }));
    if (isFirst&&isBas) renderBas(wtext);
  } catch(e) {
    $('occSp').classList.add('hidden');
    if (isFirst) $('occEmpty').classList.remove('hidden');
  }
  occSt.loading=false;
}

function buildOcc(occ,wtext,con) {
  const card=document.createElement('div'); card.className='oc';
  const ref=document.createElement('div'); ref.className='oref';
  ref.innerHTML=`<span class="oref-k"><span>${esc(occ.verse_key||'')}</span><span class="oref-arr">↗</span></span>`;
  ref.title='Bu ayete git'; ref.addEventListener('click',()=>navTo(occ.verse_key));
  card.appendChild(ref);
  const ar=document.createElement('div'); ar.className='oar';
  const ow=(occ.words||[]).filter(w=>!isPunc(w));
  if (ow.length) { ow.forEach(w=>{const wt=w.text_uthmani||w.text||'';const s=document.createElement('span');s.className='oaw'+(isMatch(wt,wtext)?' hit':'');s.textContent=wt;ar.appendChild(s);}); }
  else { const s=document.createElement('span');s.className='oaw';s.textContent=occ.text||'';ar.appendChild(s); }
  card.appendChild(ar);
  const tb=document.createElement('div'); tb.className='otr';
  tb.innerHTML=`<div class="otr-l">Türkçe Meal</div><div class="otr-t otr-ld">Yükleniyor…</div>`;
  card.appendChild(tb); con.appendChild(card);
  const ex=dh((occ.translations?.[0]?.text||'').replace(/<[^>]+>/g,''));
  return {tEl:tb.querySelector('.otr-t'),vk:occ.verse_key,ex};
}

function renderBas(wtext) {
  const sec=document.createElement('div');
  sec.innerHTML=`<div class="ot" style="margin-top:16px">Sure Başlarındaki Besmele</div>`;
  const note=document.createElement('div'); note.className='bn';
  note.textContent='Besmele her surenin başında sure başlığı olarak yer alır (Fatiha 1:1 ve Neml 27:30 hariç).';
  sec.appendChild(note);
  CHS.filter(ch=>ch.id!==9).forEach(ch=>{
    const card=document.createElement('div'); card.className='oc';
    const ref=document.createElement('div'); ref.className='oref';
    ref.innerHTML=`<span class="oref-k"><span>${esc(ch.id+'. — '+ch.ar)}</span><span class="oref-arr">↗</span></span>`;
    ref.addEventListener('click',()=>navTo(ch.id+':1')); card.appendChild(ref);
    const ar=document.createElement('div'); ar.className='oar';
    ['بِسْمِ','ٱللَّهِ','ٱلرَّحْمَٰنِ','ٱلرَّحِيمِ'].forEach(w=>{
      const s=document.createElement('span');s.className='oaw'+(isMatch(w,wtext)?' hit':'');s.textContent=w;ar.appendChild(s);
    }); card.appendChild(ar);
    const tb=document.createElement('div'); tb.className='otr';
    tb.innerHTML=`<div class="otr-l">Sure</div><div class="otr-t">${esc(ch.tr)} · ${ch.v} Ayet · ${ch.p==='makkah'?'Mekki':'Medeni'}</div>`;
    card.appendChild(tb); sec.appendChild(card);
  });
  $('occList').appendChild(sec);
}

/* ══ TURKISH WORD CLICK ══════════════════════════════════════ */
async function onTrClick(raw) {
  if (!hintOff) { hintOff=true; $('hint').classList.add('hidden'); }
  const stem=trStem(raw);
  $('sbAr').classList.add('hidden'); $('sbTr').classList.remove('hidden');
  openSb();
  $('sbTrW').textContent=raw; $('sbTrR').textContent=stem!==raw?`Yalın: "${stem}"`:'';
  $('sbTrCt').textContent=''; $('occSp').classList.remove('hidden');
  $('occEmpty').classList.add('hidden'); $('occList').innerHTML='';
  try {
    const d=await apiFetch(`${BASE}/search/${encodeURIComponent(stem)}/all/tr.diyanet`);
    const matches=d.data?.matches||[], tot=d.data?.count||0;
    $('occSp').classList.add('hidden');
    $('sbTrCt').textContent=tot>0?`${tot} ayet bulundu`:'ayet bulunamadı';
    if (!matches.length) { $('occEmpty').classList.remove('hidden'); return; }
    const con=document.createElement('div');
    con.innerHTML=`<div class="ot">Mealde Geçtiği Yerler</div>`; $('occList').appendChild(con);
    await Promise.all(matches.slice(0,30).map(async m=>{
      const vk=`${m.surah?.number}:${m.numberInSurah}`;
      const card=document.createElement('div'); card.className='oc';
      const ref=document.createElement('div'); ref.className='oref';
      ref.innerHTML=`<span class="oref-k"><span>${esc(vk)}</span><span class="oref-arr">↗</span></span>`;
      ref.addEventListener('click',()=>navTo(vk)); card.appendChild(ref);
      const ar=document.createElement('div'); ar.className='oar'; ar.textContent='…'; card.appendChild(ar);
      const tb=document.createElement('div'); tb.className='otr';
      tb.innerHTML=`<div class="otr-l">Türkçe Meal</div><div class="otr-t">${hlStem(dh((m.text||'').replace(/<[^>]+>/g,'')),stem)}</div>`;
      card.appendChild(tb); con.appendChild(card);
      try{const vd=await apiFetch(`${BASE}/ayah/${vk}/quran-uthmani`);ar.textContent=vd.data?.text||'—';}catch(e){ar.textContent='—';}
    }));
  } catch(e) { $('occSp').classList.add('hidden'); $('occEmpty').classList.remove('hidden'); }
}
function hlStem(text,stem){const s=stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(text).replace(new RegExp(`(\\S*${s}\\S*)`,'gi'),'<span class="tr-m">$1</span>');}

/* ══ NAVIGATE ════════════════════════════════════════════════ */
async function navTo(vk) {
  if (!vk) return;
  const[cs,vs]=vk.split(':'); const chId=+cs, vNum=+vs;
  if (!chId||!vNum) return;
  closeSb();
  if (curCh!==chId) {
    $('chSel').value=chId; curCh=chId; curPg=1; verses=[]; hintOff=true;
    $('vCon').innerHTML=''; $('moreBtn').classList.add('hidden');
    renderChHdr(chId); await fetchSurah(chId);
  }
  const tp=Math.ceil(vNum/PER);
  while(curPg<tp) showPg(curPg+1);
  setTimeout(()=>{
    const el=$('vCon').querySelector(`[data-vk="${CSS.escape(vk)}"]`);
    if (!el) return;
    document.querySelectorAll('.vc.nav-hl').forEach(e=>e.classList.remove('nav-hl'));
    el.classList.add('nav-hl');
    const hh=document.querySelector('.hdr')?.offsetHeight||60;
    window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-hh-16,behavior:'smooth'});
    setTimeout(()=>el.classList.remove('nav-hl'),3000);
  },100);
}

/* ══ SIDEBAR ═════════════════════════════════════════════════ */
function openSb()  { $('sb').classList.add('open'); $('main').classList.add('sb'); }
function closeSb() {
  $('sb').classList.remove('open'); $('main').classList.remove('sb');
  document.querySelectorAll('.wc.sel').forEach(e=>e.classList.remove('sel'));
  document.querySelectorAll('.mw.tsel').forEach(e=>e.classList.remove('tsel'));
  $('sbAr').classList.remove('hidden'); $('sbTr').classList.add('hidden');
}

/* ══ HELPERS ═════════════════════════════════════════════════ */
function wrapMW(t){return t.replace(/(\S+)/g,m=>{const c=m.replace(/[^a-zA-ZğüşıöçĞÜŞİÖÇ0-9]/g,'').toLowerCase();if(!c||c.length<3)return esc(m);return `<span class="mw" data-w="${esc(c)}">${esc(m)}</span>`;});}
function trStem(w){w=w.toLowerCase().replace(/â/g,'a').replace(/î/g,'i').replace(/û/g,'u');const sfx=['lerden','lardan','lerdeki','lardaki','leriyle','larıyla','lerini','larını','lerine','larına','lerinde','larında','lerin','ların','lerle','larla','lerde','larda','lere','lara','leri','ları','ler','lar','inden','ından','undan','ünden','ndeki','nden','ndan','iyle','ıyla','uyla','üyle','inin','ının','unun','ünün','nın','nin','nun','nün','inde','ında','unda','ünde','nde','nda','ine','ına','una','üne','ne','na','ini','ını','unu','ünü','ni','nı','nu','nü','den','dan','ten','tan','deki','daki','teki','taki','ile','yla','yle','de','da','te','ta','ye','ya','yi','yı','yu','yü','in','ın','un','ün','im','ım','um','üm','i','ı','u','ü','e','a'];for(const s of sfx)if(w.endsWith(s)&&w.length-s.length>=3)return w.slice(0,w.length-s.length);return w;}
function sk(n){return Array.from({length:n},(_,i)=>`<div class="vc" style="animation-delay:${i*.07}s"><div class="sk" style="height:72px;margin-bottom:11px"></div><div class="sk" style="height:14px;width:55%"></div></div>`).join('');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function dh(s){const t=document.createElement('textarea');t.innerHTML=String(s||'');return t.value;}

/* ══ ARABIC NORMALISATION ════════════════════════════════════ */
const _PF={'\uFE70':'\u064B','\uFE71':'\u064B','\uFE72':'\u064C','\uFE74':'\u064D','\uFE76':'\u064E','\uFE77':'\u064E','\uFE78':'\u064F','\uFE79':'\u064F','\uFE7A':'\u0650','\uFE7B':'\u0650','\uFE7C':'\u0651','\uFE7D':'\u0651','\uFE7E':'\u0652','\uFE7F':'\u0652','\uFE80':'\u0621','\uFE81':'\u0627','\uFE82':'\u0627','\uFE83':'\u0627','\uFE84':'\u0627','\uFE85':'\u0648','\uFE86':'\u0648','\uFE87':'\u0627','\uFE88':'\u0627','\uFE89':'\u064A','\uFE8A':'\u064A','\uFE8B':'\u064A','\uFE8C':'\u064A','\uFE8D':'\u0627','\uFE8E':'\u0627','\uFE8F':'\u0628','\uFE90':'\u0628','\uFE91':'\u0628','\uFE92':'\u0628','\uFE93':'\u0647','\uFE94':'\u0647','\uFE95':'\u062A','\uFE96':'\u062A','\uFE97':'\u062A','\uFE98':'\u062A','\uFE99':'\u062B','\uFE9A':'\u062B','\uFE9B':'\u062B','\uFE9C':'\u062B','\uFE9D':'\u062C','\uFE9E':'\u062C','\uFE9F':'\u062C','\uFEA0':'\u062C','\uFEA1':'\u062D','\uFEA2':'\u062D','\uFEA3':'\u062D','\uFEA4':'\u062D','\uFEA5':'\u062E','\uFEA6':'\u062E','\uFEA7':'\u062E','\uFEA8':'\u062E','\uFEA9':'\u062F','\uFEAA':'\u062F','\uFEAB':'\u0630','\uFEAC':'\u0630','\uFEAD':'\u0631','\uFEAE':'\u0631','\uFEAF':'\u0632','\uFEB0':'\u0632','\uFEB1':'\u0633','\uFEB2':'\u0633','\uFEB3':'\u0633','\uFEB4':'\u0633','\uFEB5':'\u0634','\uFEB6':'\u0634','\uFEB7':'\u0634','\uFEB8':'\u0634','\uFEB9':'\u0635','\uFEBA':'\u0635','\uFEBB':'\u0635','\uFEBC':'\u0635','\uFEBD':'\u0636','\uFEBE':'\u0636','\uFEBF':'\u0636','\uFEC0':'\u0636','\uFEC1':'\u0637','\uFEC2':'\u0637','\uFEC3':'\u0637','\uFEC4':'\u0637','\uFEC5':'\u0638','\uFEC6':'\u0638','\uFEC7':'\u0638','\uFEC8':'\u0638','\uFEC9':'\u0639','\uFECA':'\u0639','\uFECB':'\u0639','\uFECC':'\u0639','\uFECD':'\u063A','\uFECE':'\u063A','\uFECF':'\u063A','\uFED0':'\u063A','\uFED1':'\u0641','\uFED2':'\u0641','\uFED3':'\u0641','\uFED4':'\u0641','\uFED5':'\u0642','\uFED6':'\u0642','\uFED7':'\u0642','\uFED8':'\u0642','\uFED9':'\u0643','\uFEDA':'\u0643','\uFEDB':'\u0643','\uFEDC':'\u0643','\uFEDD':'\u0644','\uFEDE':'\u0644','\uFEDF':'\u0644','\uFEE0':'\u0644','\uFEE1':'\u0645','\uFEE2':'\u0645','\uFEE3':'\u0645','\uFEE4':'\u0645','\uFEE5':'\u0646','\uFEE6':'\u0646','\uFEE7':'\u0646','\uFEE8':'\u0646','\uFEE9':'\u0647','\uFEEA':'\u0647','\uFEEB':'\u0647','\uFEEC':'\u0647','\uFEED':'\u0648','\uFEEE':'\u0648','\uFEEF':'\u064A','\uFEF0':'\u064A','\uFEF1':'\u064A','\uFEF2':'\u064A','\uFEF3':'\u064A','\uFEF4':'\u064A','\uFEF5':'\u0644\u0627','\uFEF6':'\u0644\u0627','\uFEF7':'\u0644\u0627','\uFEF8':'\u0644\u0627','\uFEF9':'\u0644\u0627','\uFEFA':'\u0644\u0627','\uFEFB':'\u0644\u0627','\uFEFC':'\u0644\u0627'};
const _PF_RE=/[\uFE70-\uFEFC]/g;
function norm(s){return String(s).replace(_PF_RE,c=>_PF[c]||c).replace(/[\u064B-\u065F]/g,'').replace(/\u0670/g,'').replace(/[\u0610-\u061A\u06D6-\u06DC\u06DF-\u06E4\u06E7\u06E8\u06EA-\u06ED]/g,'').replace(/\u0640/g,'').replace(/[\u0622\u0623\u0625\u0671]/g,'\u0627').replace(/\u0624/g,'\u0648').replace(/\u0626/g,'\u064A').replace(/\u0649/g,'\u064A').replace(/\u0629/g,'\u0647').trim();}
function stripPre(w){for(const p of['\u0648\u0627\u0644','\u0641\u0627\u0644','\u0628\u0627\u0644','\u0643\u0627\u0644','\u0644\u0644','\u0627\u0644','\u0648','\u0641','\u0628','\u0644','\u0643'])if(w.startsWith(p)&&w.length-p.length>=2)return w.slice(p.length);return w;}
function stripSuf(w){for(const s of['\u0647\u0645','\u0647\u0646','\u0643\u0645','\u0646\u0627','\u0647\u0627','\u0647','\u0643','\u0646','\u064A','\u0627'])if(w.endsWith(s)&&w.length-s.length>=2)return w.slice(0,w.length-s.length);return w;}
function isMatch(a,b){const na=norm(a),nb=norm(b);if(!na||!nb)return false;if(na===nb)return true;const as=stripPre(na),bs=stripPre(nb);if(as===bs||as===nb||na===bs)return true;const ass=stripSuf(as),bss=stripSuf(bs);if(ass===bss&&ass.length>=2)return true;if(ass===bs||as===bss)return true;if(nb.length>=3&&(as.includes(nb)||as.includes(bs)))return true;if(bs.length>=3&&na.includes(bs))return true;return false;}
